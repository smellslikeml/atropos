name: Outrider Moonshot refine smoke (v1.7.31)

# Smoke test for outrider v1.7.31:
#   1. New `provider: moonshot` action input (v1.7.29+) — no fork-side
#      Configure step; action reads MOONSHOT_API_KEY from env: block and
#      wires ANTHROPIC_AUTH_TOKEN + base URL internally.
#   2. Bot-token TTL fix (v1.7.31) — long Kimi coding sessions used to
#      fail at git push time with a stale (>60min) installation token;
#      _mint_bot_token now re-mints past 55min and commit_and_push
#      refreshes the git remote URL before pushing.
#
# Refinement mode: pins to a drafter-known branch on atropos + its
# arxiv, dispatches Claude Code with a hardcoded lead-content directing
# it to refine mechanism-level fidelity to the paper.
#
# Manual-only (workflow_dispatch); does not schedule.

on:
  workflow_dispatch:
    inputs:
      pick-override:
        description: 'Drafter branch to refine (must exist on this fork).'
        required: false
        default: 'cde-curiosity-driven-exploration-for-efficient-reinforcement'
      pin-arxiv:
        description: 'arxiv_id of the paper (bypasses selection).'
        required: false
        default: '2509.09675v1'

concurrency:
  group: outrider-moonshot-refine-smoke
  cancel-in-progress: false

jobs:
  refine:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: remyxai/outrider@v1
        env:
          # Every registered backend's secret passed. Action's Configure
          # step picks MOONSHOT_API_KEY based on `provider: moonshot`
          # and clears the others to avoid Claude Code preferring
          # x-api-key against Moonshot.
          REMYX_API_KEY: ${{ secrets.REMYX_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
          MOONSHOT_API_KEY: ${{ secrets.MOONSHOT_API_KEY }}
        with:
          interest-id: f17d1f4c-a9cd-4c8f-bd57-8b076ff6f2ed
          mode: recommend
          publish: pr
          provider: moonshot
          model: kimi-k3
          pin-arxiv: ${{ inputs.pin-arxiv }}
          start-from-ref: ${{ inputs.pick-override }}
          lead-content: |
            REFINEMENT PASS on an existing drafter branch.

            Read the existing changes on this branch (SPEC.md if present,
            plus the actual code changes), compare against the paper
            (arxiv:2509.09675v1 — Curiosity-Driven Exploration for
            Efficient Reinforcement Learning), and refine the implementation
            to better match the paper's mechanism.

            Focus on MECHANISM-LEVEL divergences:
              - Wrong math or reward formulation
              - Missing paper rules or heuristics
              - Invented behaviors not in the paper
              - Category errors (misapplying the mechanism to the wrong subsystem)

            Not stylistic polish. If the branch is already faithful, verify
            with focused pytest additions rather than restructuring.
          staged-synthesis: 'true'
          claude-timeout: '3600'
          rate-limit-days: '0'
